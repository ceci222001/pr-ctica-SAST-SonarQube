name: CI/CD Pipeline - Node.js to GHCR
on:
  push:
    branches: ["main"]
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ceci222001/pr-ctica-sast-sonarqube
jobs:
  # ---------------------------
  # 1️⃣ SonarQube Scan
  # ---------------------------
  sonar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  # ---------------------------
  # 2️⃣ K6 Performance Test
  # ---------------------------
  k6-test:
    runs-on: ubuntu-latest
    needs: sonar
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run K6 Test
        uses: grafana/k6-action@v0.3.0
        with:
          filename: test.js
  # ---------------------------
  # 3️⃣ Build & Push Docker Image
  # ---------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: k6-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
  # ---------------------------
  # 4️⃣ Deploy to Server via SSH
  # ---------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      packages: read
    steps:
      - name: Deploy via Bastion Host
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_port: 22
          timeout: 30s
          command_timeout: 10m
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker stop my-node-app || true
            docker rm my-node-app || true
            docker pull ghcr.io/ceci222001/pr-ctica-sast-sonarqube:main
            docker run -d \
              --name my-node-app \
              -p 3000:3000 \
              --restart always \
              ghcr.io/ceci222001/pr-ctica-sast-sonarqube:main
